<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Miyuki's Closet</title>
    <link rel="shortcut icon" href="assents/3.png" type="image/x-icon">
    <!-- Fonte Pixelify Sans -->
    <link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400..700&display=swap" rel="stylesheet">
    <style>
        /* ===== RESET E CONFIGURAÇÕES GLOBAIS ===== */
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100vh;
            width: 100vw;
            background-color: #f9c4f3; /* fallback caso a imagem não carregue */
            overflow-x: hidden;
        }

        body {
            /* Ajustes para telas com notch / safe area */
            padding-top: env(safe-area-inset-top);
            padding-bottom: env(safe-area-inset-bottom);
            padding-left: env(safe-area-inset-left);
            padding-right: env(safe-area-inset-right);
            /* Garante que o body ocupe 100% da altura e largura */
            min-height: 100vh;
            min-width: 100vw;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Forçando a fonte pixelada para todos os textos principais */
        h1, h2, h3, button, p, a {
            font-family: "Pixelify Sans", sans-serif !important;
        }


        /* Título principal */
        h1 {
            font-size: 3rem;
            color: #ffecf5;
            text-shadow: 4px 4px 0 #b1126e;
            letter-spacing: 2px;
            margin-bottom: 1rem;
            background: linear-gradient(135deg, #ffffff, #ffe0f0);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            text-shadow: none;
            /* Reaplicando cor sólida com sombra para efeito pixel */
            color: #fff3f9;
            text-shadow: 3px 3px 0 #c2187a;
        }

        /* Botão START */
        .start_button {
            background-color: #f32cd5;
            font-size: 2rem;
            font-weight: bold;
            color: white;
            padding: 0.8rem 2.2rem;
            border: none;
            border-radius: 60px;
            cursor: pointer;
            transition: 0.25s ease-in-out;
            font-family: "Pixelify Sans", sans-serif;
            letter-spacing: 2px;
            box-shadow: 0 8px 0 #9e0e7a;
            transform: translateY(-2px);
            margin-bottom: 1.2rem;
        }

        .start_button:hover {
            transform: scale(1.08) translateY(-2px);
            background-color: #ff4bdf;
            box-shadow: 0 5px 0 #9e0e7a;
        }

        .start_button:active {
            transform: scale(0.98) translateY(4px);
            box-shadow: 0 2px 0 #9e0e7a;
        }

        /* Container da logo (imagem abaixo do botão) */
        .logo-container {
            margin-top: 1rem;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            animation: fadeInUp 0.6s ease-out;
        }

        /* Responsividade para telas menores */
        @media (max-width: 680px) {
            .container {
                padding: 1.5rem;
            }
            .container h1 {
                font-size: 2.2rem;
                text-shadow: 2px 2px 0 #b1126e;
            }
            .container p {
                font-size: 1rem;
                padding: 0.4rem 1rem;
                margin-bottom: 1.5rem;
            }
            .start_button {
                font-size: 1.6rem;
                padding: 0.6rem 1.6rem;
            }
            .brand-logo {
                max-width: 130px;
            }
            .logo-fallback {
                font-size: 1.8rem;
                padding: 6px 18px;
            }
        }

        @media (max-width: 480px) {
            .container h1 {
                font-size: 1.8rem;
            }
            .start_button {
                font-size: 1.4rem;
            }
            .brand-logo {
                max-width: 110px;
            }
        }

        /* Ajuste extra: para que o container centralize perfeitamente em alturas baixas */
        @media (max-height: 600px) {
            .container {
                justify-content: center;
                padding: 1rem;
            }
            .container h1 {
                margin-bottom: 0.25rem;
            }
            .container p {
                margin-bottom: 1rem;
            }
            .logo-container {
                margin-top: 0.5rem;
            }
        }

        /* Correção do fundo: caso a imagem demore ou não exista, fundo rosa fofo */
        body {
            background-color: #f9c4f3;
        }

        /* Remove qualquer estilo conflitante de .start que estava no CSS antigo */
        .start {
            display: flex;
            justify-content: center;
            width: 100%;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Título principal -->
        <h1>Welcome to Miyuki's Closet</h1>
        
        <!-- Texto de exploração -->
        <!-- <p>Embark on a fashion adventure with Miyuki! Explore</p> -->
        
        <!-- Botão START - redireciona para game.html -->
        <div class="start">
            <button class="start_button" onclick="location.href='game.html'">
                START
            </button>
        </div>
        
    </div>
</body>
</html>
